name: FileViewerIpad

options:
  bundleIdPrefix: com.timetochilltoo
  deploymentTarget:
    iOS: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_MACCATALYST: "NO"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
    GENERATE_INFOPLIST_FILE: "YES"

targets:
  FileViewerIpad:
    type: application
    platform: iOS
    sources:
      - path: FileViewerIpad
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timetochilltoo.FileViewerIpad
        INFOPLIST_KEY_CFBundleDisplayName: FileViewer
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  FileViewerIpadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FileViewerIpadTests
    dependencies:
      - target: FileViewerIpad
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timetochilltoo.FileViewerIpadTests

  FileViewerIpadUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FileViewerIpadUITests
    dependencies:
      - target: FileViewerIpad
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timetochilltoo.FileViewerIpadUITests

schemes:
  FileViewerIpad:
    build:
      targets:
        FileViewerIpad: all
    test:
      targets:
        - name: FileViewerIpadTests
        - name: FileViewerIpadUITests
